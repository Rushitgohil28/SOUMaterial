<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOUMaterial | BCA Hons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="dark">
    <header class="topbar">
      <div class="brand-wrap">
        <button id="menuBtn" class="icon-btn" aria-label="Toggle menu">Menu</button>
        <a class="brand" href="#/">SOUMaterial</a>
      </div>
      <nav id="mainNav" class="main-nav">
        <a href="#/">Home</a>
        <a href="#/semesters">Semesters</a>
        <a href="#/timetable">Timetable</a>
        <a href="#/notices">Notices</a>
      </nav>
      <button id="themeToggle" class="theme-btn" aria-label="Switch theme">
        <span id="themeText">Light</span>
      </button>
    </header>

    <main id="app"></main>

    <template id="homeTemplate">
      <section class="hero">
        <p class="eyebrow">BCA Hons Resource Hub</p>
        <h1>Semester-wise Material, Timetable, and Notices</h1>
        <p>
          Find notes, units, and syllabus quickly. Keep track of classes with
          timetable updates and never miss important notices.
        </p>
        <div class="hero-actions">
          <a class="btn" href="#/semesters">Explore Semesters</a>
          <a class="btn ghost" href="#/notices">View Notices</a>
        </div>
      </section>
      <section id="quickStats" class="strip"></section>
      <section>
        <div class="page-head">
          <h2>All Semesters</h2>
          <a class="btn ghost small" href="#/semesters">Open Full View</a>
        </div>
        <p class="sub">Choose a semester to open subject folders and unit files.</p>
        <div id="homeSemesterGrid" class="grid"></div>
      </section>
      <section>
        <div class="page-head">
          <h2>Class Timetable</h2>
          <a class="btn ghost small" href="#/timetable">Open Full Timetable</a>
        </div>
        <div class="search-panel">
          <label for="homeTimetableDaySearch">Search by Day</label>
          <div class="search-row">
            <input id="homeTimetableDaySearch" type="text" placeholder="Type day name (e.g. Monday)" />
            <button id="homeTimetableSearchBtn" class="btn small" type="button">Search</button>
          </div>
        </div>
        <div id="homeTimetableWrap"></div>
      </section>
      <section>
        <div class="page-head">
          <h2>Notices</h2>
          <a class="btn ghost small" href="#/notices">Open All Notices</a>
        </div>
        <div id="homeNoticeList" class="stack"></div>
      </section>
    </template>

    <template id="semestersTemplate">
      <section>
        <h2>All Semesters</h2>
        <p class="sub">Choose a semester to open subjects and materials.</p>
        <div id="semesterGrid" class="grid"></div>
      </section>
    </template>

    <template id="semesterTemplate">
      <section>
        <div class="page-head">
          <h2 id="semesterTitle"></h2>
          <a class="btn ghost small" href="#/semesters">Back to Semesters</a>
        </div>
        <p class="sub">Select a subject to view units and syllabus files.</p>
        <div id="subjectList" class="stack"></div>
      </section>
    </template>

    <template id="subjectTemplate">
      <section>
        <div class="page-head">
          <h2 id="subjectTitle"></h2>
          <a id="backToSemester" class="btn ghost small" href="#/semesters">Back</a>
        </div>
        <div id="materialTableWrap"></div>
      </section>
    </template>

    <template id="timetableTemplate">
      <section>
        <h2>Class Timetable</h2>
        <p class="sub">Latest schedule for BCA Hons classes.</p>
        <div class="search-panel">
          <label for="timetableDaySearch">Search by Day</label>
          <div class="search-row">
            <input id="timetableDaySearch" type="text" placeholder="Type day name (e.g. Monday)" />
            <button id="timetableSearchBtn" class="btn small" type="button">Search</button>
          </div>
        </div>
        <div id="timetableWrap"></div>
      </section>
    </template>

    <template id="noticesTemplate">
      <section>
        <h2>Latest Notices</h2>
        <p class="sub">Important announcements from faculty and admin.</p>
        <div id="noticeList" class="stack"></div>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
