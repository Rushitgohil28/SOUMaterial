  <title>SOUMaterial - BCA Study Materials Hub</title>
  
  <!-- Immediate Theme Loader to prevent white flash -->
  <script>
    (function() {
      try {
        var savedTheme = localStorage.getItem('soumaterial_theme');
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    })();
  </script>
  
  <!-- Prefetch Google Font Connections -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="./src/styles/main.css?v=2">
</head>

<body>
  <div id="navbar-root"></div>
  <main id="app-container" class="container"></main>
  <div id="modal-root"></div>
  
  <footer class="footer">
    <p>Made by <a href="https://github.com/soumaterial" target="_blank" rel="noopener">SOU Students</a> for SOU Students</p>
  </footer>

  <script type="module">
    import { renderNavbar } from './src/components/Navbar.js?v=2';
    import { renderDocViewer } from './src/components/DocViewer.js?v=2';
    import { renderSearch } from './src/components/Search.js?v=2';
    import { loadHome } from './src/components/Home.js?v=2';

    // Initialize layout and overlay utilities
    renderNavbar();
    renderDocViewer();
    renderSearch();

    // Default entrypoint: load the welcome semester explorer
    loadHome(); 
  </script>
</body>

</html>
