  <!-- Immediate Theme Loader to prevent white flash -->
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem('soumaterial_theme');
        if (savedTheme === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { }
    })();
  </script>
